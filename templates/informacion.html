<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Información — Citaciones</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:   #f5c518;
    --gold2:  #e6a800;
    --dark:   #1a1a2e;
    --white:  #ffffff;
    --bg:     #f9fafb;
    --border: #e5e7eb;
    --gray:   #6b7280;
    --gray2:  #f3f4f6;
    --red:    #ef4444;
    --green:  #10b981;
    --amber:  #f59e0b;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 40px;
    background: var(--white);
    border-bottom: 3px solid var(--gold);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    position: sticky; top: 0; z-index: 10;
  }
  .logo-dot {
    width: 10px; height: 10px;
    background: var(--gold); border-radius: 50%;
    box-shadow: 0 0 8px var(--gold);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  header h1 {
    font-size: 1rem; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--dark);
  }
  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem; padding: 4px 12px;
    background: rgba(245,197,24,0.12);
    border: 1px solid rgba(245,197,24,0.4);
    border-radius: 20px; color: #92700a; font-weight: 600;
  }
  .btn-volver {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px;
    background: var(--gray2); border: 1px solid var(--border);
    color: var(--dark); border-radius: 8px;
    font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 600;
    cursor: pointer; text-decoration: none;
    transition: background .2s;
    margin-left: auto;
  }
  .btn-volver:hover { background: #e5e7eb; }

  /* ── MAIN ── */
  main { max-width: 1000px; margin: 0 auto; padding: 36px 24px 60px; animation: fadeUp .4s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

  /* ── PERSONA CARD ── */
  .persona-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-left: 4px solid var(--gold);
    border-radius: 12px; padding: 24px 28px; margin-bottom: 14px;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .persona-nombre { font-size: 1.4rem; font-weight: 800; margin-bottom: 6px; color: var(--dark); }
  .persona-meta { font-family: 'DM Mono', monospace; font-size: 0.76rem; color: var(--gray); line-height: 1.9; }
  .persona-meta span { color: var(--dark); }

  .licencia-side { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .puntos-circle {
    width: 72px; height: 72px; border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border: 3px solid var(--gold);
    box-shadow: 0 0 16px rgba(245,197,24,0.25);
    background: rgba(245,197,24,0.06);
  }
  .puntos-num { font-size: 1.6rem; font-weight: 800; color: var(--gold2); line-height: 1; }
  .puntos-lbl { font-size: 0.56rem; color: var(--gray); text-transform: uppercase; letter-spacing: .06em; }
  .lic-meta { font-family: 'DM Mono', monospace; font-size: 0.71rem; color: var(--gray); text-align: right; line-height: 1.9; }
  .lic-meta span { color: var(--dark); font-weight: 600; }

  /* ── RESUMEN FINANCIERO ── */
  .fin-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px; margin-bottom: 16px;
  }
  .fin-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .fin-label { font-size: 0.66rem; text-transform: uppercase; letter-spacing: .1em; color: var(--gray); margin-bottom: 8px; }
  .fin-value { font-family: 'DM Mono', monospace; font-size: 1.15rem; font-weight: 600; }
  .fin-value.danger { color: var(--red); }
  .fin-value.ok     { color: var(--green); }
  .fin-value.warn   { color: var(--amber); }

  /* ── TABS ── */
  .tabs { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
  .tab {
    padding: 8px 16px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--white);
    color: var(--gray); font-family: 'Syne', sans-serif;
    font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all .2s;
  }
  .tab:hover { border-color: var(--gold); color: var(--dark); }
  .tab.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--dark);
    font-weight: 700;
  }
  .tab .cnt {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(0,0,0,0.1); font-size: 0.7rem; margin-left: 6px;
  }

  /* ── TABLA ── */
  .table-wrap {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px; overflow-x: auto;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; min-width: 680px; }
  thead th {
    background: var(--gray2);
    padding: 11px 16px; text-align: left;
    font-size: 0.67rem; letter-spacing: .08em;
    text-transform: uppercase; color: var(--gray);
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(245,197,24,0.04); }
  td { padding: 12px 16px; font-family: 'DM Mono', monospace; vertical-align: middle; color: var(--dark); }
  .td-text { font-family: 'Syne', sans-serif; font-size: 0.8rem; max-width: 200px; line-height: 1.4; }

  /* ── PILLS ── */
  .pill {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 0.67rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
  }
  .pill-pendiente { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
  .pill-pagada    { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
  .pill-anulada   { background: #f3f4f6; color: #6b7280; border: 1px solid #d1d5db; }
  .pill-impugnada { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

  .empty-state {
    text-align: center; padding: 48px 24px;
    color: var(--gray); font-size: 0.9rem;
  }
  .empty-icon { font-size: 2rem; display: block; margin-bottom: 12px; }

  .timestamp {
    text-align: right; font-family: 'DM Mono', monospace;
    font-size: 0.66rem; color: #9ca3af; margin-top: 16px;
  }

  #no-data {
    display: none; text-align: center; padding: 80px 24px; color: var(--gray);
  }

  @media(max-width:640px) {
    header { padding: 12px 16px; }
    main { padding: 20px 12px 48px; }
    .persona-card { padding: 18px; }
    .persona-nombre { font-size: 1.15rem; }
    .licencia-side { align-items: flex-start; }
    .lic-meta { text-align: left; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-dot"></div>
  <h1>Simulación de Sistema de Citaciones</h1>
  <a class="btn-volver" href="/">⮜ Nueva consulta</a>
  <div class="badge">AXIS v4.0</div>
</header>

<main id="main-content">

  <div id="no-data">
    <div style="font-size:2.5rem;margin-bottom:16px;">⚠</div>
    <p>No hay datos para mostrar.<br>
    <a href="/" style="color:var(--gold2);text-decoration:none;font-weight:700;">
      ← Realiza una consulta primero
    </a></p>
  </div>

  <div class="persona-card" id="personaCard" style="display:none"></div>
  <div class="fin-grid"     id="finGrid"></div>
  <div class="tabs"         id="tabs"></div>

  <div class="table-wrap" id="tableWrap" style="display:none">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th># Citación</th>
          <th>Entidad</th>
          <th>Placa</th>
          <th>Fecha Emisión</th>
          <th>Infracción</th>
          <th>Puntos</th>
          <th>Multa</th>
          <th>Total a Pagar</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody id="tablaCitaciones"></tbody>
    </table>
  </div>

  <div class="timestamp" id="timestamp"></div>
</main>

<script>
  const TABS   = ['pendientes','pagadas','anuladas','impugnadas'];
  const LABELS = { pendientes:'Pendientes', pagadas:'Pagadas', anuladas:'Anuladas', impugnadas:'En Impugnación' };
  let datos = null, tabActual = 'pendientes';

  window.addEventListener('DOMContentLoaded', () => {
    const raw = sessionStorage.getItem('informacion');
    if (!raw) { document.getElementById('no-data').style.display = 'block'; return; }
    datos = JSON.parse(raw);
    renderTodo();
  });

  function renderTodo() {
    const d = datos, p = d.persona, l = d.licencia;
    const estadoLic = l ? l.estado : '—';
    const colorLic  = estadoLic === 'ACTIVA' ? 'var(--green)'
                    : estadoLic === 'SUSPENDIDA' ? 'var(--red)' : 'var(--gray)';

    document.getElementById('personaCard').innerHTML = `
      <div>
        <div class="persona-nombre">${p.apellidos} ${p.nombres}</div>
        <div class="persona-meta">
          CED &mdash; <span>${p.cedula}</span><br>
          Sexo: <span>${p.sexo||'—'}</span> &nbsp;·&nbsp; E. Civil: <span>${p.estado_civil||'—'}</span><br>
          Lugar de nacimiento: <span>${p.lugar_nacimiento||'—'}</span><br>
          Nacionalidad: <span>${p.nacionalidad||'—'}</span>
        </div>
      </div>
      <div class="licencia-side">
        <div class="puntos-circle">
          <span class="puntos-num">${l ? l.puntos : '—'}</span>
          <span class="puntos-lbl">puntos</span>
        </div>
        <div class="lic-meta">
          LICENCIA TIPO: <span>${l ? l.tipo : '—'}</span><br>
          VALIDEZ: <span>${l ? fmtFecha(l.fecha_emision)+' – '+fmtFecha(l.fecha_expiracion) : '—'}</span><br>
          ESTADO: <span style="color:${colorLic};font-weight:700">${estadoLic}</span>
        </div>
      </div>`;
    document.getElementById('personaCard').style.display = 'flex';

    const totalPend = d.total_pendiente;
    document.getElementById('finGrid').innerHTML = `
      <div class="fin-card"><div class="fin-label">Valor Pendiente</div>
        <div class="fin-value ${totalPend>0?'danger':'ok'}">$ ${totalPend.toFixed(2)}</div></div>
      <div class="fin-card"><div class="fin-label">Pendientes</div>
        <div class="fin-value ${d.pendientes.length>0?'warn':'ok'}">${d.pendientes.length}</div></div>
      <div class="fin-card"><div class="fin-label">Pagadas</div>
        <div class="fin-value ok">${d.pagadas.length}</div></div>
      <div class="fin-card"><div class="fin-label">En Impugnación</div>
        <div class="fin-value">${d.impugnadas.length}</div></div>
      <div class="fin-card"><div class="fin-label">Anuladas</div>
        <div class="fin-value">${d.anuladas.length}</div></div>`;

    renderTabs(); renderTabla();
    document.getElementById('tableWrap').style.display = 'block';
    document.getElementById('timestamp').textContent =
      `CONSULTA · PRODUCCIÓN · ${new Date().toLocaleString('es-EC')} · AXIS – Versión 4.0`;
  }

  function renderTabs() {
    document.getElementById('tabs').innerHTML = TABS.map(t => `
      <button class="tab ${t===tabActual?'active':''}" onclick="cambiarTab('${t}')">
        ${LABELS[t]}<span class="cnt">${datos[t].length}</span>
      </button>`).join('');
  }

  function cambiarTab(tab) { tabActual = tab; renderTabs(); renderTabla(); }

  function renderTabla() {
    const lista = datos[tabActual];
    const tbody = document.getElementById('tablaCitaciones');
    if (!lista.length) {
      tbody.innerHTML = `<tr><td colspan="10"><div class="empty-state">
        <span class="empty-icon">📋</span>No hay citaciones en este estado</div></td></tr>`;
      return;
    }
    tbody.innerHTML = lista.map((c,i) => `
      <tr>
        <td>${i+1}</td>
        <td>${c.numero_citacion||'—'}</td>
        <td class="td-text">${c.entidad||'—'}</td>
        <td>${c.placa||'—'}</td>
        <td>${fmtFechaHora(c.fecha)}</td>
        <td class="td-text">${c.nombre_contravencion||'—'}</td>
        <td>${c.puntos_perdidos??0}</td>
        <td>$ ${parseFloat(c.multa_calculada||0).toFixed(2)}</td>
        <td>$ ${parseFloat(c.total_pagar||0).toFixed(2)}</td>
        <td><span class="pill pill-${c.estado}">${c.estado}</span></td>
      </tr>`).join('');
  }

  function fmtFecha(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('es-EC',{day:'2-digit',month:'2-digit',year:'numeric'});
  }
  function fmtFechaHora(d) {
    if (!d) return '—';
    return new Date(d).toLocaleString('es-EC',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  }
</script>
</body>
</html>
