<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta de Citaciones</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:   #f5c518;
    --gold2:  #e6a800;
    --dark:   #1a1a2e;
    --gray:   #6b7280;
    --gray2:  #f3f4f6;
    --border: #e5e7eb;
    --red:    #ef4444;
    --white:  #ffffff;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Syne', sans-serif;
    background: #f9fafb;
    color: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 40px;
    background: var(--white);
    border-bottom: 3px solid var(--gold);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .logo-wrap { display: flex; align-items: center; gap: 12px; }
  .logo-dot {
    width: 10px; height: 10px;
    background: var(--gold); border-radius: 50%;
    box-shadow: 0 0 8px var(--gold);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  header h1 {
    font-size: 1rem; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--dark);
  }
  .badge {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem; padding: 4px 12px;
    background: rgba(245,197,24,0.12);
    border: 1px solid rgba(245,197,24,0.4);
    border-radius: 20px; color: #92700a;
    font-weight: 600;
  }

  /* ── MAIN ── */
  main {
    flex: 1; display: flex;
    align-items: center; justify-content: center; padding: 40px 24px;
  }

  /* ── CARD ── */
  .search-card {
    width: 100%; max-width: 500px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 44px 40px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    animation: fadeUp .4s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  .card-icon {
    width: 52px; height: 52px;
    background: rgba(245,197,24,0.12);
    border: 2px solid var(--gold);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; margin-bottom: 22px;
  }

  .search-card h2 {
    font-size: 1.7rem; font-weight: 800; margin-bottom: 8px;
    color: var(--dark);
  }
  .search-card h2 span { color: var(--gold2); }
  .search-card p {
    color: var(--gray); font-size: 0.86rem;
    margin-bottom: 32px; line-height: 1.6;
  }

  /* ── CAMPOS ── */
  .field-label {
    font-size: 0.7rem; text-transform: uppercase;
    letter-spacing: .08em; color: var(--gray);
    margin-bottom: 6px; font-weight: 600;
  }
  .field-group { display: flex; flex-direction: column; gap: 14px; }

  select, input[type="text"] {
    width: 100%;
    background: var(--gray2);
    border: 1px solid var(--border);
    color: var(--dark);
    font-family: 'Syne', sans-serif;
    font-size: 0.92rem; padding: 12px 14px;
    border-radius: 8px; outline: none;
    transition: border .2s, box-shadow .2s;
  }
  select { cursor: pointer; }
  input[type="text"]:focus, select:focus {
    border-color: var(--gold);
    background: var(--white);
    box-shadow: 0 0 0 3px rgba(245,197,24,0.15);
  }
  input::placeholder { color: #9ca3af; }

  /* ── BOTÓN ── */
  .btn-search {
    width: 100%; margin-top: 4px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 14px;
    background: linear-gradient(135deg, var(--gold2), var(--gold));
    color: #1a1a2e;
    border: none; border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem; font-weight: 800;
    cursor: pointer; transition: transform .15s, box-shadow .15s;
    letter-spacing: .04em;
  }
  .btn-search:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(245,197,24,0.4);
  }
  .btn-search:disabled { opacity: .6; cursor: not-allowed; transform: none; }

  /* ── SPINNER ── */
  .btn-spinner {
    display: none; width: 18px; height: 18px;
    border: 2px solid rgba(26,26,46,0.2);
    border-top-color: #1a1a2e;
    border-radius: 50%; animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── ERROR ── */
  .error-box {
    display: none;
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 8px; padding: 12px 16px;
    color: #b91c1c; font-size: 0.84rem;
    margin-top: 14px; text-align: center;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center; padding: 18px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem; color: #9ca3af;
    border-top: 1px solid var(--border);
    background: var(--white);
  }

  @media(max-width:500px) {
    .search-card { padding: 28px 20px; }
    header { padding: 14px 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="logo-dot"></div>
    <h1>Simulación de Sistema de Citaciones</h1>
  </div>
  <div class="badge">AXIS v4.0 · NeonDB</div>
</header>

<main>
  <div class="search-card">
    <div class="card-icon">🔍</div>
    <h2>Consulta de <span>Citaciones</span></h2>
    <p>Ingresar la cédula de identidad o el nombre de la persona para consultar sus citaciones de tránsito.</p>

    <div class="field-group">
      <div>
        <div class="field-label">Tipo de búsqueda</div>
        <select id="tipoBusqueda">
          <option value="cedula">Cédula de Identidad</option>
          <option value="nombre">Nombres y Apellidos</option>
        </select>
      </div>
      <div>
        <div class="field-label">Valor</div>
        <input type="text" id="valorBusqueda" placeholder="Ej: 1725090698" />
      </div>
      <button class="btn-search" id="btnBuscar" onclick="buscar()">
        <div class="btn-spinner" id="btnSpinner"></div>
        <span id="btnTexto">Consultar →</span>
      </button>
    </div>

    <div class="error-box" id="errorBox"></div>
  </div>
</main>

<footer>CONSULTA · PRODUCCIÓN · AXIS – Versión 4.0</footer>

<script>
  document.getElementById('valorBusqueda').addEventListener('keydown', e => {
    if (e.key === 'Enter') buscar();
  });

  async function buscar() {
    const tipo  = document.getElementById('tipoBusqueda').value;
    const valor = document.getElementById('valorBusqueda').value.trim();
    if (!valor) return;

    document.getElementById('btnSpinner').style.display = 'block';
    document.getElementById('btnTexto').textContent = 'Consultando…';
    document.getElementById('btnBuscar').disabled = true;
    document.getElementById('errorBox').style.display = 'none';

    try {
      const res  = await fetch('/api/consulta', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tipo, valor })
      });
      const json = await res.json();

      if (!res.ok || json.error) {
        mostrarError(json.error || 'No se encontraron resultados.');
        resetBtn();
        return;
      }

      sessionStorage.setItem('informacion', JSON.stringify(json));
      window.location.href = '/informacion';

    } catch(e) {
      mostrarError('No se pudo conectar con el servidor.');
      resetBtn();
    }
  }

  function mostrarError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = '⚠ ' + msg;
    box.style.display = 'block';
  }

  function resetBtn() {
    document.getElementById('btnSpinner').style.display = 'none';
    document.getElementById('btnTexto').textContent = 'Consultar →';
    document.getElementById('btnBuscar').disabled = false;
  }
</script>
</body>
</html>
